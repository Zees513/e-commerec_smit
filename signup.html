<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIÈRE | Sign Up</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="index.html">LUMIÈRE</a>
            </div>
            
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="menu-icon"><i class="fas fa-bars"></i></label>
            
            <nav class="nav-links">
                <a href="index.html#home">Home</a>
                <a href="index.html#men">Men</a>
                <a href="index.html#women">Women</a>
                <a href="index.html#new-arrivals">New Arrivals</a>
                <a href="index.html#sale" class="sale-link">Sale</a>
            </nav>
            
            <div class="nav-icons">
                <a href="#" aria-label="Search"><i class="fas fa-search"></i></a>
                <a href="login.html" aria-label="User Profile"><i class="far fa-user"></i></a>
                <a href="#" aria-label="Shopping Cart" class="cart-icon">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count">2</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Signup Section -->
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join LUMIÈRE to elevate your style</p>
            </div>
            
            <button class="btn btn-google btn-block">
                <img src="./images/google.webp" alt="Google Logo" class="google-icon">
                Continue with Google
            </button>
            
            <div class="auth-divider">or sign up with email</div>
            
            <form action="#" class="auth-form">
                <div class="form-group">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Create a password" required>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" required> I agree to the Terms & Conditions
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block btn-auth" id="signupBtn">Sign Up</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script src="./firebase.js" type="module"></script>
</body>
</html>
